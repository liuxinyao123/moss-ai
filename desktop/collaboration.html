<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSclaw - 多智能体协作系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --danger: #da3633;
            --warning: #d29922;
            --info: #1f6feb;
            --card-bg: #1c2128;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 顶部导航 */
        .top-nav {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i { color: var(--accent); font-size: 24px; }

        .nav-items {
            display: flex;
            gap: 5px;
        }

        .nav-item {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .nav-item:hover { background: var(--bg-tertiary); }
        .nav-item.active { background: var(--bg-tertiary); color: var(--accent); }

        .status-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面容器 */
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .page.active { display: flex; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i { color: var(--accent); }

        /* 卡片网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i { color: var(--accent); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Agent 列表 */
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-card:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .agent-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .agent-status.online { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .agent-status.offline { background: rgba(218, 54, 51, 0.2); color: #f85149; }

        .agent-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
        }

        /* 任务列表 */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-title {
            font-weight: 600;
        }

        .task-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .task-status.pending { background: rgba(210, 153, 34, 0.2); color: #d29922; }
        .task-status.running { background: rgba(31, 111, 235, 0.2); color: #58a6ff; }
        .task-status.completed { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .task-status.failed { background: rgba(218, 54, 51, 0.2); color: #f85149; }

        .progress-bar {
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .task-info {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }

        /* 消息日志 */
        .message-log {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            overflow-y: auto;
            max-height: 400px;
        }

        .message-entry {
            padding: 5px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .message-time { color: var(--text-secondary); min-width: 80px; }
        .message-type { 
            min-width: 100px;
            font-weight: 600;
        }
        .message-type.sent { color: #3fb950; }
        .message-type.received { color: #58a6ff; }
        .message-type.broadcast { color: #d29922; }
        .message-content { flex: 1; color: var(--text-primary); }

        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover { background: var(--bg-secondary); }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 对话框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title { font-size: 18px; font-weight: 600; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="logo">
            <i class="ri-robot-2-line"></i>
            <span>DSclaw</span>
        </div>
        <div class="nav-items">
            <div class="nav-item active" onclick="switchPage('dashboard')">

            <div class="nav-item" onclick="switchPage('agents')">

            </div>

            <!-- 统计卡片 -->
        <div class="grid-container">
            <div class="card">
                <div class="card-header">

                    </span>
                </div>
                <div class="stat-grid" id="agentStats">

                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">在线Agent</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">总技能数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">总领域数</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">
                        <i class="ri-task-line"></i>
                        任务统计
                    </span>
                </div>
                <div class="stat-grid" id="taskStats">
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">进行中</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">
                        <i class="ri-message-3-line"></i>
                        消息统计
                    </span>
                </div>
                <div class="stat-grid" id="messageStats">
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">总消息数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">待送达</div>

                    <div class="stat-item">
                        <div class="stat-value">-</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">委托历史</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 实时消息日志 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">

                    实时协作事件

                <button class="btn btn-sm btn-secondary" onclick="clearEventLog()">
                    <i class="ri-delete-bin-line"></i>

                </button>
            </div>
            <div class="message-log" id="eventLog">
                <!-- 事件日志将在这里显示 -->

    <!-- Agent管理页面 -->
    <div class="page" id="page-agents">
        <div class="page-header">
            <h1 class="page-title">
                <i class="ri-group-line"></i>
                Agent能力管理

                <i class="ri-task-line"></i>
                任务协作管理

                <button class="btn btn-secondary" onclick="loadTasks()">
                    <i class="ri-refresh-line"></i>

                <button class="btn btn-primary" onclick="openTaskModal()">

                <input type="text" id="msgTo" placeholder="接收者Agent ID（逗号分隔）" style="flex: 1; min-width: 200px;">
                <select id="msgType">
                    <option value="direct">点对点</option>
                    <option value="broadcast">广播</option>
                </select>

        <div class="message-log" id="messageList" style="margin-top: 20px;">
            <!-- 消息列表将在这里显示 -->

    <!-- 智能委托页面 -->
    <div class="page" id="page-delegate">
        <div class="page-header">
            <h1 class="page-title">
                <i class="ri-magic-line"></i>
                智能委托
            </h1>
            <button class="btn btn-secondary" onclick="loadDelegationHistory()">
                <i class="ri-refresh-line"></i>
                刷新
            </button>

            </div>

    </div>

    <!-- 添加Agent对话框 -->
    <div class="modal" id="agentModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">添加Agent能力</span>
                <button class="btn btn-sm btn-secondary" onclick="closeAgentModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="form-group">
                <label>Agent ID</label>
                <input type="text" id="agentId" placeholder="例如: agent-coder">
            </div>
            <div class="form-group">
                <label>技能（逗号分隔）</label>
                <input type="text" id="agentSkills" placeholder="例如: code, debug, review">
            </div>
            <div class="form-group">
                <label>领域（逗号分隔）</label>
                <input type="text" id="agentDomains" placeholder="例如: backend, frontend">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeAgentModal()">取消</button>
                <button class="btn btn-primary" onclick="addAgent()">添加</button>
            </div>
        </div>
    </div>

    <!-- 创建任务对话框 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">创建协作任务</span>
                <button class="btn btn-sm btn-secondary" onclick="closeTaskModal()">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="form-group">
                <label>任务名称</label>
                <input type="text" id="taskName" placeholder="例如: 开发新功能">
            </div>
            <div class="form-group">
                <label>任务描述</label>
                <textarea id="taskDesc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>发起者Agent ID</label>
                <input type="text" id="taskInitiator" placeholder="例如: agent-coder">
            </div>
            <div class="form-group">
                <label>优先级</label>
                <select id="taskPriority">
                    <option value="normal">正常</option>
                    <option value="high">高</option>
                    <option value="low">低</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTaskModal()">取消</button>
                <button class="btn btn-primary" onclick="createTask()">创建</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api/collaboration';
        const WS_URL = 'ws://localhost:3001/ws/collaboration';
        
        let ws = null;
        
        // 初始化
        window.onload = () => {
            checkServerStatus();
            connectWebSocket();
            refreshDashboard();
            loadAgents();
            loadTasks();
            loadDelegationHistory();
        };
        
        // 检查服务器状态
        async function checkServerStatus() {
            try {
                const response = await fetch('http://localhost:3001/health');
                const data = await response.json();
                
                const statusEl = document.getElementById('serverStatus');
                if (data.status === 'healthy' || data.status === 'degraded') {
                    statusEl.textContent = '运行中';
                    statusEl.style.color = '#3fb950';
                } else {
                    statusEl.textContent = '异常';
                    statusEl.style.color = '#f85149';
                }
            } catch (error) {
                document.getElementById('serverStatus').textContent = '离线';
                document.getElementById('serverStatus').style.color = '#f85149';
            }
        }
        
        // WebSocket连接
        function connectWebSocket() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                addEventLog('✅ WebSocket已连接');
                // 订阅所有事件
                ws.send(JSON.stringify({ type: 'subscribe', events: ['*'] }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addEventLog(`📨 [${data.type}] ${JSON.stringify(data).substring(0, 100)}`);
                    
                    // 处理特定事件
                    if (data.type === 'task_progress') {
                        refreshDashboard();
                        loadTasks();
                    }
                } catch (e) {
                    addEventLog(`❌ 消息解析失败: ${e.message}`);
                }
            };
            
            ws.onerror = (error) => {
                addEventLog(`❌ WebSocket错误`);
            };
            
            ws.onclose = () => {
                addEventLog('🔌 WebSocket已断开');
                // 5秒后重连
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        // 切换页面
        function switchPage(pageId) {
            // 更新导航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // 更新页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(`page-${pageId}`).classList.add('active');
            
            // 加载数据
            if (pageId === 'agents') loadAgents();
            if (pageId === 'tasks') loadTasks();
            if (pageId === 'messages') loadMessages();
            if (pageId === 'delegate') loadDelegationHistory();
        }
        
        // 刷新仪表盘
        async function refreshDashboard() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                if (data.success) {
                    // Agent统计
                    document.getElementById('agentStats').innerHTML = `
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.abilities.total_agents || 0}</div>
                            <div class="stat-label">总Agent数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.abilities.online_agents || 0}</div>
                            <div class="stat-label">在线Agent</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.abilities.total_skills || 0}</div>
                            <div class="stat-label">总技能数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.abilities.total_domains || 0}</div>
                            <div class="stat-label">总领域数</div>
                        </div>
                    `;
                    
                    // 任务统计
                    const taskBreakdown = data.stats.tasks.status_breakdown || {};
                    document.getElementById('taskStats').innerHTML = `
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.tasks.total_tasks || 0}</div>
                            <div class="stat-label">总任务数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${(taskBreakdown.running || 0) + (taskBreakdown.pending || 0)}</div>
                            <div class="stat-label">进行中</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${taskBreakdown.completed || 0}</div>
                            <div class="stat-label">已完成</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${taskBreakdown.failed || 0}</div>
                            <div class="stat-label">失败</div>
                        </div>
                    `;
                    
                    // 消息统计
                    document.getElementById('messageStats').innerHTML = `
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.messages.total_messages || 0}</div>
                            <div class="stat-label">总消息数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.messages.undelivered_count || 0}</div>
                            <div class="stat-label">待送达</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.messages.online_handlers || 0}</div>
                            <div class="stat-label">在线客户端</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.stats.delegation.total_delegations || 0}</div>
                            <div class="stat-label">委托历史</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('刷新失败:', error);
            }
        }
        
        // 加载Agent列表
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE}/abilities`);
                const data = await response.json();
                
                const listEl = document.getElementById('agentList');
                
                if (data.success && Object.keys(data.abilities).length > 0) {
                    listEl.innerHTML = Object.entries(data.abilities).map(([agentId, ability]) => `
                        <div class="agent-card">
                            <div class="agent-header">
                                <span class="agent-name">
                                    <i class="ri-robot-line"></i>
                                    ${agentId}
                                </span>
                                <span class="agent-status ${ability.availability.is_online ? 'online' : 'offline'}">
                                    ${ability.availability.is_online ? '在线' : '离线'}
                                </span>
                            </div>
                            <div class="agent-skills">
                                ${ability.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                                ${ability.domains.map(domain => `<span class="skill-tag">${domain}</span>`).join('')}
                            </div>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">暂无Agent</div>';
                }
            } catch (error) {
                console.error('加载Agent失败:', error);
            }
        }
        
        // 加载任务列表
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks?limit=20`);
                const data = await response.json();
                
                const listEl = document.getElementById('taskList');
                
                if (data.success && data.tasks.length > 0) {
                    listEl.innerHTML = data.tasks.map(task => `
                        <div class="task-card">
                            <div class="task-header">
                                <span class="task-title">${task.name}</span>
                                <span class="task-status ${task.status}">${task.status}</span>
                            </div>
                            <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 10px;">
                                ${task.description.substring(0, 100)}${task.description.length > 100 ? '...' : ''}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${task.progress.percentage}%"></div>
                            </div>
                            <div class="task-info">
                                <span>子任务: ${task.progress.completed}/${task.progress.total}</span>
                                <span>发起者: ${task.initiatoriator || 'N/A'}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">暂无任务</div>';
                }
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }
        
        // 加载消息列表
        async function loadMessages() {
            try {
                const response = await fetch(`${API_BASE}/messages?limit=20`);
                const data = await response.json();
                
                const listEl = document.getElementById('messageList');
                
                if (data.success && data.messages.length > 0) {
                    listEl.innerHTML = data.messages.map(msg => `
                        <div class="message-entry">
                            <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                            <span class="message-type ${msg.type}">${msg.type}</span>
                            <span class="message-content">${msg.from} → ${msg.to}: ${msg.content.substring(0, 60)}</span>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无消息</div>';
                }
            } catch (error) {
                console.error('加载消息失败:', error);
            }
        }
        
        // 加载委托历史
        async function loadDelegationHistory() {
            try {
                const response = await fetch(`${API_BASE}/delegate/history?limit=20`);
                const data = await response.json();
                
                const listEl = document.getElementById('delegationHistory');
                
                if (data.success && data.history.length > 0) {
                    listEl.innerHTML = data.history.map(item => `
                        <div class="message-entry">
                            <span class="message-time">${new Date(item.timestamp).toLocaleTimeString()}</span>
                            <span class="message-type received">${item.type}</span>
                            <span class="message-content">${item.initiatorId} → ${item.targetAgentId}</span>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无委托记录</div>';
                }
            } catch (error) {
                console.error('加载委托历史失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const from = document.getElementById('msgFrom').value;
            const to = document.getElementById('msgTo').value;
            const type = document.getElementById('msgType').value;
            const content = document.getElementById('msgContent').value;
            
            if (!from || !to || !content) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const endpoint = type === 'direct' ? 'send' : 'broadcast';
                const response = await fetch(`${API_BASE}/messages/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from,
                        to: type === 'direct' ? to : to.split(',').map(s => s.trim()),
                        content
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('消息发送成功');
                    document.getElementById('msgContent').value = '';
                    loadMessages();
                } else {
                    alert('发送失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('发送失败: ' + error.message);
            }
        }
        
        // 委托任务
        async function delegateTask() {
            const initiator_id = document.getElementById('delegateFrom').value;
            const name = document.getElementById('delegateName').value;
            const description = document.getElementById('delegateDesc').value;
            const requiredSkills = document.getElementById('delegateSkills').value.split(',').map(s => s.trim());
            const requiredDomains = document.getElementById('delegateDomains').value.split(',').map(s => s.trim());
            
            if (!initiator_id || !name || !description) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/delegate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initiator_id,
                        name,
                        description,
                        requiredSkills: requiredSkills.filter(s => s),
                        requiredDomains: requiredDomains.filter(s => s)
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('委托成功');
                    document.getElementById('delegateDesc').value = '';
                    loadDelegationHistory();
                } else {
                    alert('委托失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('委托失败: ' + error.message);
            }
        }
        
        // 打开Agent对话框
        function openAgentModal() {
            document.getElementById('agentModal').classList.add('active');
        }
        
        function closeAgentModal() {
            document.getElementById('agentModal').classList.remove('active');
        }
        
        // 添加Agent
        async function addAgent() {
            const agentId = document.getElementById('agentId').value;
            const skills = document.getElementById('agentSkills').value.split(',').map(s => s.trim());
            const domains = document.getElementById('agentDomains').value.split(',').map(s => s.trim());
            
            if (!agentId) {
                alert('请填写Agent ID');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/abilities/${agentId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        skills: skills.filter(s => s),
                        domains: domains.filter(s => s)
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Agent添加成功');
                    closeAgentModal();
                    loadAgents();
                    refreshDashboard();
                } else {
                    alert('添加失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }
        
        // 打开任务对话框
        function openTaskModal() {
            document.getElementById('taskModal').classList.add('active');
        }
        
        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        
        // 创建任务
        async function createTask() {
            const name = document.getElementById('taskName').value;
            const description = document.getElementById('taskDesc').value;
            const initiator = document.getElementById('taskInitiator').value;
            const priority = document.getElementById('taskPriority').value;
            
            if (!name || !description) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        description,
                        initiator: initiator || null,
                        priority
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('任务创建成功');
                    closeTaskModal();
                    loadTasks();
                    refreshDashboard();
                } else {
                    alert('创建失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('创建失败: ' + error.message);
            }
        }
        
        // 添加事件日志
        function addEventLog(text) {
            const logEl = document.getElementById('eventLog');
            const entry = document.createElement('div');
            entry.className = 'message-entry';
            entry.innerHTML = `
                <span class="message-time">${new Date().toLocaleTimeString()}</span>
                <span class="message-content">${text}</span>
            `;
            logEl.insertBefore(entry, logEl.firstChild);
            
            // 限制日志数量
            while (logEl.children.length > 100) {
                logEl.removeChild(logEl.lastChild);
            }
        }
        
        // 清空事件日志
        function clearEventLog() {
            document.getElementById('eventLog').innerHTML = '';
        }
    </script>
</body>
</html>
