<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSclaw 实时通信测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #5e8b7e;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .status-indicator.online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        
        .status-indicator.offline {
            background: #f44336;
        }
        
        .panel {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
        }
        
        .panel-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-title::before {
            content: '';
            width: 8px;
            height: 20px;
            background: #5e8b7e;
            border-radius: 4px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e7ee;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #5e8b7e;
            box-shadow: 0 0 0 3px rgba(94, 139, 126, 0.1);
        }
        
        button {
            padding: 12px 24px;
            background: #5e8b7e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        
        button:hover {
            background: #4a6f65;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        .messages {
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .message-item {
            padding: 10px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .message-content {
            color: #333;
        }
        
        .log {
            font-family: 'SF Mono', Menlo, monospace;
            background: #2d2d2d;
            color: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-item {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .log-item.info { color: #4fc3f7; }
        .log-item.success { color: #81c784; }
        .log-item.error { color: #e57373; }
        .log-item.warning { color: #ffb74d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐬 DSclaw 实时通信测试</h1>
        
        <div class="status">
            <div class="status-indicator offline" id="status-indicator"></div>
            <span id="status-text">未连接</span>
        </div>
        
        <div class="panel">
            <div class="panel-title">🔐 智能体认证</div>
            <div class="form-group">
                <label>选择智能体</label>
                <select id="agent-select">
                    <option value="">请选择智能体</option>
                </select>
            </div>
            <button id="auth-btn" disabled>认证</button>
        </div>
        
        <div class="panel">
            <div class="panel-title">📡 频道订阅</div>
            <div class="form-group">
                <label>选择频道</label>
                <select id="channel-select">
                    <option value="">请选择频道</option>
                </select>
            </div>
            <button id="subscribe-btn" disabled>订阅频道</button>
            <button id="unsubscribe-btn" disabled style="margin-left: 10px;">取消订阅</button>
        </div>
        
        <div class="panel">
            <div class="panel-title">💬 发送消息</div>
            <div class="form-group">
                <label>消息内容</label>
                <textarea id="message-input" rows="3" placeholder="输入要发送的消息..."></textarea>
            </div>
            <button id="send-btn" disabled>发送消息</button>
        </div>
        
        <div class="messages" id="messages-container">
            <div style="text-align: center; color: #999; padding: 20px;">
                暂无消息，订阅频道后消息将显示在这里
            </div>
        </div>
        
        <div class="log" id="log-container">
            <div class="log-item info">🧪 实时通信测试启动</div>
            <div class="log-item info">⏳ 等待连接...</div>
        </div>
    </div>

    <script>
        // 配置
        const WS_SERVER = 'ws://localhost:3001/ws';
        
        // 全局变量
        let ws = null;
        let currentAgentId = null;
        let currentChannelId = null;
        let messages = [];
        let logEntries = [];
        
        // DOM 元素
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const agentSelect = document.getElementById('agent-select');
        const channelSelect = document.getElementById('channel-select');
        const authBtn = document.getElementById('auth-btn');
        const subscribeBtn = document.getElementById('subscribe-btn');
        const unsubscribeBtn = document.getElementById('unsubscribe-btn');
        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');
        const logContainer = document.getElementById('log-container');
        
        // 日志函数
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = {
                timestamp,
                message,
                type
            };
            logEntries.push(entry);
            
            const logElement = document.createElement('div');
            logElement.className = `log-item ${type}`;
            logElement.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logElement);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            console.log(`[${timestamp}] ${message}`);
        }
        
        // 添加消息
        function addMessage(data) {
            const messageItem = document.createElement('div');
            messageItem.className = 'message-item';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `
                <span><strong>${data.sender || '未知'}</strong></span>
                <span>${new Date(data.timestamp || Date.now()).toLocaleString()}</span>
            `;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = data.content;
            
            messageItem.appendChild(header);
            messageItem.appendChild(content);
            messagesContainer.appendChild(messageItem);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // WebSocket 连接
        function connectWebSocket() {
            log('正在连接到 WebSocket 服务器...', 'info');
            
            try {
                ws = new WebSocket(WS_SERVER);
                
                ws.onopen = () => {
                    statusIndicator.className = 'status-indicator online';
                    statusText.textContent = '已连接';
                    log('✅ WebSocket 连接成功', 'success');
                    
                    // 加载数据
                    loadAgents();
                    loadChannels();
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (error) {
                        log(`消息解析错误: ${error}`, 'error');
                    }
                };
                
                ws.onclose = (event) => {
                    statusIndicator.className = 'status-indicator offline';
                    statusText.textContent = '连接断开';
                    log(`🔴 WebSocket 断开连接: ${event.code} ${event.reason || ''}`, 'error');
                    
                    // 尝试重新连接
                    setTimeout(() => {
                        if (!ws || ws.readyState === WebSocket.CLOSED) {
                            log('尝试重新连接...', 'warning');
                            connectWebSocket();
                        }
                    }, 3000);
                };
                
                ws.onerror = (error) => {
                    log(`WebSocket 错误: ${error}`, 'error');
                };
                
            } catch (error) {
                log(`连接失败: ${error}`, 'error');
            }
        }
        
        // 处理 WebSocket 消息
        function handleWebSocketMessage(data) {
            log(`收到消息: ${data.type}`, 'info');
            
            switch (data.type) {
                case 'welcome':
                    log(`🆔 客户端ID: ${data.clientId}`, 'info');
                    break;
                    
                case 'auth_success':
                    currentAgentId = data.agentId;
                    log(`✅ 认证成功: ${data.agentId}`, 'success');
                    break;
                    
                case 'subscribe_success':
                    currentChannelId = data.channelId;
                    log(`✅ 订阅成功: ${data.channelId}`, 'success');
                    break;
                    
                case 'unsubscribe_success':
                    currentChannelId = null;
                    log(`✅ 取消订阅成功`, 'success');
                    break;
                    
                case 'channel_message':
                    log(`📨 频道消息: ${data.content}`, 'info');
                    addMessage({
                        sender: data.senderAgentId,
                        content: data.content,
                        timestamp: data.timestamp
                    });
                    break;
                    
                case 'error':
                    log(`❌ 服务器错误: ${data.error}`, 'error');
                    break;
                    
                default:
                    log(`未知消息类型: ${data.type}`, 'warning');
            }
        }
        
        // 发送 WebSocket 消息
        function sendWebSocketMessage(message) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('WebSocket 未连接', 'error');
                return false;
            }
            
            try {
                ws.send(JSON.stringify(message));
                log(`发送消息: ${message.type}`, 'info');
                return true;
            } catch (error) {
                log(`发送失败: ${error}`, 'error');
                return false;
            }
        }
        
        // 加载智能体列表
        async function loadAgents() {
            try {
                const response = await fetch('http://localhost:3001/api/agents');
                const data = await response.json();
                
                if (data.success) {
                    agentSelect.innerHTML = '<option value="">请选择智能体</option>';
                    data.agents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent.id;
                        option.textContent = `${agent.name} (${agent.model})`;
                        agentSelect.appendChild(option);
                    });
                    
                    log(`✅ 加载 ${data.agents.length} 个智能体`, 'success');
                }
            } catch (error) {
                log(`加载智能体失败: ${error}`, 'error');
            }
        }
        
        // 加载频道列表
        async function loadChannels() {
            try {
                const response = await fetch('http://localhost:3001/api/channels');
                const data = await response.json();
                
                if (data.success) {
                    channelSelect.innerHTML = '<option value="">请选择频道</option>';
                    data.channels.forEach(channel => {
                        const option = document.createElement('option');
                        option.value = channel.id;
                        option.textContent = `#${channel.name} (${channel.subscriber_count} 订阅)`;
                        channelSelect.appendChild(option);
                    });
                    
                    log(`✅ 加载 ${data.channels.length} 个频道`, 'success');
                }
            } catch (error) {
                log(`加载频道失败: ${error}`, 'error');
            }
        }
        
        // 初始化事件监听器
        function initEventListeners() {
            // 认证按钮
            authBtn.addEventListener('click', () => {
                const agentId = agentSelect.value;
                if (!agentId) return;
                
                sendWebSocketMessage({
                    type: 'auth',
                    agentId,
                    timestamp: Date.now()
                });
            });
            
            // 订阅按钮
            subscribeBtn.addEventListener('click', () => {
                const channelId = channelSelect.value;
                if (!channelId || !currentAgentId) return;
                
                sendWebSocketMessage({
                    type: 'subscribe_channel',
                    channelId,
                    timestamp: Date.now()
                });
            });
            
            // 取消订阅按钮
            unsubscribeBtn.addEventListener('click', () => {
                const channelId = channelSelect.value;
                if (!channelId || !currentAgentId) return;
                
                sendWebSocketMessage({
                    type: 'unsubscribe_channel',
                    channelId,
                    timestamp: Date.now()
                });
            });
            
            // 发送消息按钮
            sendBtn.addEventListener('click', () => {
                const content = messageInput.value.trim();
                if (!content || !currentChannelId) return;
                
                sendWebSocketMessage({
                    type: 'channel_message',
                    channelId: currentChannelId,
                    content,
                    timestamp: Date.now()
                });
                
                messageInput.value = '';
            });
            
            // 智能体选择变化
            agentSelect.addEventListener('change', () => {
                authBtn.disabled = !agentSelect.value;
            });
            
            // 频道选择变化
            channelSelect.addEventListener('change', () => {
                const enabled = !!channelSelect.value && !!currentAgentId;
                subscribeBtn.disabled = !enabled;
                unsubscribeBtn.disabled = !enabled;
                sendBtn.disabled = !enabled || !messageInput.value.trim();
            });
            
            // 消息输入变化
            messageInput.addEventListener('input', () => {
                sendBtn.disabled = !currentChannelId || !messageInput.value.trim();
            });
        }
        
        // 初始化应用
        function init() {
            log('🚀 DSclaw 实时通信测试启动', 'info');
            
            initEventListeners();
            connectWebSocket();
            
            log('✅ 应用初始化完成', 'success');
        }
        
        // 启动应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
